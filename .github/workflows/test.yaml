name: Test

on:
  push:
    branches: [main]
    paths-ignore: ['**.md']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md']
  workflow_dispatch:

jobs:
  shell-lint:
    name: Shell scripts
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install ShellCheck
      run: sudo apt-get install -y shellcheck

    - name: Check syntax (bash -n)
      run: |
        FAIL=0
        for f in module/*.sh module/patch/*.sh; do
          bash -n "$f" || FAIL=1
        done
        exit $FAIL

    - name: ShellCheck
      run: |
        # SC3043: 'local' is undefined in POSIX sh — Android uses mksh, local is fine
        # SC2034: unused variables — many are read by while loops or inherited from upstream
        # SC2115: rm -rf with variable — these paths are always absolute
        # SC2046: unquoted command substitution — inherited from APatch scripts
        # SC2319: $? in condition — inherited from APatch scripts
        shellcheck -s sh -S warning --exclude=SC3043,SC2034,SC2115,SC2046,SC2319 \
          module/service.sh module/customize.sh module/post-fs-data.sh module/action.sh module/status.sh module/uninstall.sh
        shellcheck -s sh -S warning --exclude=SC3043,SC2034,SC2115,SC2046,SC2319 \
          module/patch/boot_patch.sh module/patch/boot_extract.sh module/patch/boot_unpatch.sh
        # util_functions.sh has many inherited patterns from APatch, only check for errors
        shellcheck -s sh -S error module/patch/util_functions.sh || true

  webui-build:
    name: WebUI build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - uses: pnpm/action-setup@v4
      with:
        version: latest

    - uses: actions/setup-node@v4
      with:
        node-version: latest
        cache: pnpm
        cache-dependency-path: webui/pnpm-lock.yaml

    - name: Install dependencies
      run: cd webui && pnpm install --frozen-lockfile

    - name: Build
      run: cd webui && pnpm build

  locale-check:
    name: Locale consistency
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Check locale keys match en.xml
      run: |
        extract_keys() {
          grep -oP 'name="\K[^"]+' "$1" | sort
        }

        BASE_KEYS=$(extract_keys webui/public/locales/strings/en.xml)

        for f in webui/public/locales/strings/*.xml; do
          [ "$(basename "$f")" = "en.xml" ] && continue
          LANG_KEYS=$(extract_keys "$f")

          MISSING=$(comm -23 <(echo "$BASE_KEYS") <(echo "$LANG_KEYS"))

          if [ -n "$MISSING" ]; then
            COUNT=$(echo "$MISSING" | wc -l)
            echo "::warning file=$f::$COUNT missing keys (will fallback to en)"
          fi
        done

  config-check:
    name: Config consistency
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Verify module.prop matches update.json
      run: |
        PROP_VER=$(grep '^version=' module/module.prop | cut -d= -f2)
        JSON_VER=$(jq -r .version update.json)

        if [ "$PROP_VER" != "$JSON_VER" ]; then
          echo "::error::Version mismatch: module.prop=$PROP_VER, update.json=$JSON_VER"
          exit 1
        fi

        PROP_CODE=$(grep '^versionCode=' module/module.prop | cut -d= -f2)
        JSON_CODE=$(jq -r .versionCode update.json)

        if [ "$PROP_CODE" != "$JSON_CODE" ]; then
          echo "::error::VersionCode mismatch: module.prop=$PROP_CODE, update.json=$JSON_CODE"
          exit 1
        fi

    - name: Verify version.properties has required keys
      run: |
        for key in kpatch-next kernelpatch magiskboot; do
          if ! grep -q "^$key=" version.properties; then
            echo "::error::Missing key '$key' in version.properties"
            exit 1
          fi
        done

    - name: Verify all referenced script files exist
      run: |
        FAIL=0
        for f in module/service.sh module/customize.sh module/post-fs-data.sh module/action.sh module/status.sh module/uninstall.sh module/patch/boot_patch.sh module/patch/boot_extract.sh module/patch/boot_unpatch.sh module/patch/util_functions.sh module/module.prop; do
          if [ ! -f "$f" ]; then
            echo "::error::Referenced file missing: $f"
            FAIL=1
          fi
        done
        exit $FAIL
